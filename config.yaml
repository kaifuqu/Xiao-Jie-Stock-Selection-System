# ==========================================
# 小杰AI选股系统 Pro V26.2（机构实战·防弹版）— 与 constants.APP_VERSION 一致
# 市值口径（与 constants.py / data_fetcher 一致）：
#   · 下载门槛：总市值 total_mv 或流通市值 circ_mv 任一侧 ≥100 亿（万元阈值 DAILY_BASIC_MIN_MV_WAN=1_000_000），P0 自选代码豁免。
#   · 参与门槛：流通市值 circ_mv ≥100 亿（P1_SELECT_MIN_CIRC_MV_WAN=1_000_000）；如需放宽可用本文件 strategies.p1.select_min_circ_mv_wan 覆盖。
#   · P2/P3/P4/P5 等战法条目的 circ_mv_min_wan 见下文 strategies.*；原则上继续沿用“参与门槛=流通市值”口径。
# 引入 10000 积分特色数据：筹码/北向/两融
# ==========================================

tushare:
  token: ""  # ← 请通过 .env 文件设置 TUSHARE_TOKEN，首次运行系统会自动引导
  # token：Tushare 接口密钥（不是 URL）。custom_endpoint 留空 = 官方直连 api.waditu.com，无需也不走 HTTP 代理。
  # 仅当运行环境无法解析官方域名（如 getaddrinfo 失败）时，再按需填写 Tushare 提供的专线 base URL（那是接口网关地址，不是系统代理）。
  custom_endpoint: ""
  # 若系统/终端设置了 HTTP_PROXY=127.0.0.1:7897 而本机代理未开，Tushare 会读超时；data_fetcher.retry_api 会自动尝试一次直连。
  # 长期建议：能直连公网则清空 HTTP_PROXY/HTTPS_PROXY，或保持 Clash「系统代理」开启。

download:
  skip_moneyflow: false
  # 老机器/磁盘慢时可将 150 改为 90（减轻晚间增量与 DuckDB 写入压力）
  max_days_per_run: 150

database:
  # 实际文件始终在「本项目根目录/data/」下；file 仅指定文件名，勿写盘符路径
  file: quant_data.duckdb

# 【企微推送网关】与侧边栏「企微实盘预警」叠加：enabled 且勾选且 URL 非空才异步推送
notification:
  enabled: true
  # 原地址：仅用于 p1~p5 选股推送 + 每天 9:18 固定消息
  wechat_webhook_url: ""  # ← 请通过 .env 文件设置 WEIXIN_WEBHOOK_URL
  # 新地址：用于维护、下载、报错、任务执行结果等全部其他系统消息
  wechat_webhook_url_secondary: ""  # ← 请通过 .env 文件设置

# DeepSeek 分析建议：仅追加到 P2/P3/P4/P5 个股企微推送末尾；失败时不影响原推送
# API Key 通过 .env 或环境变量 DEEPSEEK_API_KEY 配置，不写入本文件。
deepseek_analysis:
  enabled: true
  api_key: ""  # ← 请通过 .env 文件设置 DEEPSEEK_API_KEY，首次运行系统会自动引导
  base_url: "https://api.deepseek.com/chat/completions"
  model: "deepseek-v4-pro"
  thinking_enabled: true
  reasoning_effort: "high"
  timeout_seconds: 45
  max_tokens: 8000

# 守护进程告警静默规则：匹配 title/detail 任一命中则只记日志，不推企微/系统提示
# silence_keywords 为包含匹配；blacklist_categories 为精确类别匹配
# whitelist_keywords 命中时优先放行（即使其它静默规则命中）
daemon_alert_silence:
  enabled: true
  whitelist_keywords: []
  blacklist_categories: []
  silence_keywords:
    - "数据库体积异常放大"
    - "重铸后仍显著放大"
    - "未分类异常（请查看 data/runtime/sniper.log 末条栈追踪）"

notify:
  wechat_webhook: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=3611f6d0-2a7d-4b08-9d24-c69aeee01190"

# 历史字段：原 sync_daemon 已移除；晚间 19:05 增量、19:15 P1、19:30 P5 以 auto_sniper_daemon 为准。
server:
  auto_update_time: "19:05"
  # 守护进程资源档：standard=P3/P4 每 150s + 异步队列约 10s（12G 内存可放心用）；low=P3/P4 每 150s + 异步 15s（更省 CPU）
  daemon_profile: "standard"
  # 可选显式覆盖（整数；注释掉则完全按 profile）
  # daemon_p3_poll_interval_seconds: 150
  # daemon_async_queue_poll_seconds: 20
  # 兼容旧字段（分钟制；若保留则会自动换算为秒）
  # daemon_p3_poll_interval_minutes: 2

# ---------------------------------------------------------------------------
# P3/P4 异步扫描队列（pending.json）：生产环境由 auto_sniper_daemon 独占消费锁并轮询；
# 与 Streamlit 内嵌 ScanAsyncWorker 二选一（filelock），避免双进程抢队列。
# ---------------------------------------------------------------------------
# embed_worker_in_streamlit:
#   true  — 仅启动 Streamlit、无守护进程时（进程内 ScanAsyncWorker 消费队列）。
#   false — 强制不嵌入（推荐与 start_server 二进程部署一致）。
#   auto  — 若另一进程已持有 pending_queue_consumer.filelock → 不嵌入 UI。
# 环境变量 XIAOJIE_EMBED_UI_SCAN_WORKER（1/0/true/false/auto）优先于本配置。
scan_async:
  embed_worker_in_streamlit: false

# ---------------------------------------------------------------------------
# 双轨行情雷达（Regime）：主/副状态阈值与日线统计 SQL 净化参数
# 修改后随进程重载；与 core/regime_analyzer.py 对齐。
# ---------------------------------------------------------------------------
regime:
  lookback_days: 20
  primary_window_days: 10
  min_sample_days: 5
  primary:
    trend_up_ratio: 0.52
    trend_down_ratio: 0.42
  secondary:
    climax_up_ratio: 0.65
    climax_avg_pct_chg: 1.0
    freeze_up_ratio: 0.35
    freeze_avg_pct_chg: -1.0
    rebound_delta: 0.1
  sql_filter:
    max_abs_pct_chg: 30.0
    min_vol: 0.0
    # 常见指数/基准在 daily_data 中若存在则排除；可按本地库实际再增删
    exclude_index_ts_codes:
      - "000001.SH"
      - "399001.SZ"
      - "399006.SZ"
      - "000300.SH"

backtest:
  hold_days: 5            

strict_mode:
  p2_auction_vr: 1.2      
  p3_intraday_vr: 1.45    
  # P4 尾盘阈值：用于尾盘战法门槛（与 P4 150s 轮询、14:31–14:55 优先窗配套）
  p4_tail_vr: 1.75        
  min_turnover_f: 1.8     

penalty_rules:
  max_score_cap: 200         
  min_pass_score: 85         
  penalty_multipliers:
    afternoon_sneak: 0.7     
    early_afternoon: 0.85    
    high_amplitude: 0.8      

# ---------------------------------------------------------------------------
# 风险控制全局配置：与 core/strategies/risk_control_engine.RiskControlConfig 对齐
# 修改保存后，下次引擎读盘（config.yaml mtime 变化）或每轮 run_all 刷新时生效（未外部注入 risk_cfg 时）。
# ---------------------------------------------------------------------------
risk_control:
  # true: 纯 UI 预警模式——一层/二层红线仅打 ⚠️[预警] 标签，不拦截 P2–P5 战法命中（极端行情可快速放宽）。
  # false: 旧版硬否决——触碰红线即不出票（与引擎内 pass_layer1/pass_layer2 一致）。
  ui_alert_only: true

