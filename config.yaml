# =============================================================================
# sop_v11（历史节名保留）：大盘指数熔断 + 缩量观察池三键；UI 已移除纪律日志/背书池/疲劳日
# =============================================================================
sop_v11:
  enabled: true
  # 系统级熔断：东财 push2 指数涨跌幅 f170（单位 0.01%）；仅作提示，默认不拦截引擎
  circuit_breaker:
    enabled: true
    # 14:30 后（北京时间）若任一指数当日跌幅 ≤ 阈值（负数）则触发 advisory
    active_after_hhmm: "14:30"
    index_thresholds_pct:
      "000300.SH": -2.0              # 沪深300
      "399006.SZ": -2.5              # 创业板指（波动更大可略宽）
    # 为 true 时：指挥舱对 P4 扫描前弹出强警告（需在 app 内接 enforce）
    enforce_block_p4: false
  # 东财 secid：1=沪 0=深
  index_secid_map:
    "000300.SH": "1.000300"
    "399006.SZ": "0.399006"
  # ---------------------------------------------------------------------------
  # 极端缩量期观察池 / 门禁放宽（实盘可调，改 config 后随 mtime 自动重载，无需改源码）
  # ---------------------------------------------------------------------------
  observation_pool_relax:
    # 触发全市场「缩量语境」的量比中位数上限：med_vr 低于此且近5日均换手低迷时 market_contraction_score 可达 ≥0.7
    vr_shrink_gate: 0.95
    # 享受「主力净流入为正 → 股性呆滞换手地板再 ×0.8」的流通市值下限（单位：亿元）
    large_cap_yi_min: 500.0
    # 上述再放宽后，大中盘真实换手率（turnover_rate_f，单位：%）的绝对底线
    turnover_floor_pct: 0.52