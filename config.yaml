# =============================================================================
# strategies: P1–P5 与黄金门禁阈值（原代码硬编码默认值已原样迁入，便于实盘微调）
# 策略实验室可在会话内覆写；引擎每次扫描前从此处 + 会话合并加载。
# =============================================================================
strategies:
  # ---------- P1 底仓：三档市场环境 profile（与 pool_manager._get_regime_thresholds 逻辑对应）----------
  p1:
    # 候选 SQL + 安检共用流通下限（万元）；注释掉则使用 constants.P1_SELECT_MIN_CIRC_MV_WAN（默认 100 亿 = 1000000）
    select_min_circ_mv_wan: 1000000
    # 十一维后与 fund_memory_score（0~200→0~100）凸组合权重；0=纯十一维；缺省使用 constants.FUND_MEMORY_WEIGHT_P1
    fund_memory_weight_p1: 0.10
    # scan_engine 的 danger 熔断会写入 blacklist.json；默认不在 P1 洗盘中拦截（避免强势股误判后次日被踢出底仓池）。需旧行为时改为 true。
    respect_scan_blacklist_for_p1: false
    # Tushare share_float「未来约30天解禁」拦截；默认 false（不调接口，避免专线/代理超时）。需要时再改为 true。
    use_tushare_unlock_blacklist_for_p1: false
    # 组合特征乘数参数：只奖励跨维度共振，不奖励单项极值
    combo_multiplier:
      enabled: true
      min: 0.90
      max: 1.18
      top_tier: 1.20
      second_tier: 1.15
      third_tier: 1.12
      industry_dark_flow: 1.08
      fund_shape_wakeup: 1.15
      fund_pulse_confirm: 1.10
      weak_pattern_discount: 0.94
      bubble_discount: 0.92
      hot_low_fund_discount: 0.95
      chip_core_min: 8.5
      trend_dist_min: 6.0
      mat_min: 4.5
      fund_core_min: 8.0
      momentum_core_min: 6.5
      golden_core_min: 8.0
      healthy_core_min: 2.4
      slope_core_min: 4.2
      fund_hot_min: 11.0
      chip_hot_min: 6.0
      trend_health_min: 2.0
      industry_bonus_min: 8.0
      rank_bonus_min: 2.0
    # 近 20 日股性黑名单惩罚：长上影 / 冲高回落反复出现则折价或拦截
    stock_behavior_penalty:
      enabled: true
      lookback_days: 20
      long_upper_shadow_hits_min: 3
      intraday_dump_hits_min: 3
      score_penalty: 8.0
    profiles:
      # 严格：趋势市 / 主升浪精选
      strict:
        trend_ma120_min_ratio: 1.00      # MA60 >= MA120 * 此值
        trend_slope_fastpass: 0.35         # MA20 五日斜率弱多头放行阈值
        near_ma20_min_ratio: 0.99          # 收盘 >= MA20 * 此值 视为贴近均线
        macd_bar_kill: -0.08               # MACD 柱低于此值淘汰
        vol_divergence_ratio: 0.90           # 阳量 < 阴量 * 此值 视为量价背离
        pass_line: 50.0                    # P1 十一维平滑分及格线：趋势市精选，提高底仓质量
      # 中性：震荡市稳健（与原模块顶部 P1_* 常量一致）
      neutral:
        trend_ma120_min_ratio: 0.98
        trend_slope_fastpass: 0.25
        near_ma20_min_ratio: 0.985
        macd_bar_kill: -0.13
        vol_divergence_ratio: 0.85
        pass_line: 48.0
      # 放松：退潮 / 空头提高生存率（不放开硬风控底线）
      relaxed:
        trend_ma120_min_ratio: 0.975
        trend_slope_fastpass: 0.10
        near_ma20_min_ratio: 0.982
        macd_bar_kill: -0.16
        vol_divergence_ratio: 0.82
        pass_line: 45.0

  # ---------- P2 竞价筛选（P2-01~P2-04）----------
  p2:
    circ_mv_min_wan: 1000000.0
    circ_mv_prefer_wan: 5000000.0
    open_bias20_max_pct: 8.0
    auction_pct_chg_max: 6.0
    prev_turnover_min_pct: 2.4
    # P2-01·★主升浪确认
    s1_prev_pct_low: 4.0
    s1_prev_pct_high: 6.0
    s1_prev_vol_ratio_min: 1.75
    # 【V26.6 修复】策略一昨日获利盘下限（筹码集中度门槛）
    s1_winner_min: 85.0
    # 【V26.2 新增】今日竞价量比下限（涨跌停时跳过）
    s1_vol_ratio_min: 1.8
    s1_auction_pct_low: 1.0
    s1_auction_pct_high: 3.0
    # 【V26.2 新增】昨 ATR 超限否决阈值
    s1_atr_pct_max: 8.0
    # P2-02·★机构连贯发力
    s2_prev_pct_low: 4.0
    s2_prev_pct_high: 6.0
    s2_pct_low: 0.5
    s2_pct_high: 2.5
    s2_auction_pct_low: 0.5
    s2_auction_pct_high: 2.5
    s2_auction_turnover_min_pct: 0.5
    s2_upper_shadow_max_pct: 2.5
    s2_inst_net_buy_ratio_of_float_mv: 0.00006
    s2_prev_vol_ratio_min: 1.8
    # P2-03·★无尽苍穹
    s3_winner_min: 90.0
    s3_pct_low: 1.0
    s3_pct_high: 4.0
    s3_vol_ratio_min: 1.5
    s3_atr_pct_max: 8.0
    s3_auction_amount_vs_prev_ratio_min: 0.05
    # 【V26.2 新增】P2-03 涨跌停宽容：涨停时换手下限适当放宽
    s3_auction_turnover_min_pct: 0.4
    # 【V26.2 新增】P2-03 长上影容忍（涨停日上影正常存在）
    s3_upper_shadow_max_pct: 2.5
    # 【V26.6 修复】策略三龙虎榜机构净买动态比例门槛（连续2日）
    s3_inst_net_buy_ratio_of_float_mv: 0.00006
    # P2-04·★底仓重金点火
    s4_circ_mv_min_wan: 5000000.0
    s4_net_main_ratio_of_float_mv: 0.00018
    s4_pct_low: 2.0
    s4_pct_high: 4.0
    s4_strth_ratio_of_circ_mv_wan: 0.0004

  # ---------- P3 盘中筛选（原 P3IntradayScreenerConfig 默认值）----------
  p3:
    circ_mv_min_wan: 1000000.0
    bias_20_max_pct: 8.0
    # 【V26.2 新增】P3-01 昨日涨幅区间（涨跌停时放宽到9.5%）
    s1_prev_pct_low: 3.0
    s1_prev_pct_high: 6.0
    s1_pct_low: 3.0
    s1_pct_high: 6.5
    s1_vol_ma5_mult: 1.5
    s1_winner_min: 85.0
    # 【V26.2 新增】P3-01 ATR上限防飞刀
    s1_atr_pct_max: 8.0
    # 【V26.2 新增】P3-03 昨日涨幅区间（涨跌停时放宽）
    s3_prev_pct_low: 3.0
    s3_prev_pct_high: 6.0
    s3_winner_min: 90.0
    s3_pct_low: 2.0
    s3_pct_high: 5.0
    s3_vol_ratio_min: 1.5
    s3_rsi_fly: 80.0
    # 【V26.2 新增】P3-03 长上影容忍（涨停日上影正常存在）
    s3_upper_shadow_max_pct: 2.5
    # P3-02 均线低吸
    s2_pct_low: -1.0
